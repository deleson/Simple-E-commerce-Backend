version: '3.8'

services:
  # --- Redis 服务 (缓存 & 消息队列) ---
  redis:
    image: redis:6.2-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # --- Elasticsearch 服务 (搜索引擎) ---
  elasticsearch:
    image: elasticsearch:7.17.10
    container_name: ecommerce_es
    environment:
      - discovery.type=single-node # 单节点模式，开发环境专用
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # 限制内存使用，防止吃光你电脑内存
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

  # --- Kibana 服务 (ES 的可视化管理界面) ---
  kibana:
    image: kibana:7.17.10
    container_name: ecommerce_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: always

# 定义数据卷 (持久化存储，重启 Docker 数据不丢)
volumes:
  redis_data:
  es_data: