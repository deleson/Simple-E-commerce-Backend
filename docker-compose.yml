version: '3.8'

services:
  # 1. MySQL 数据库
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: root_password
    # 仅在开发调试时映射端口，生产环境可关闭
    ports:
      - "33065:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  # 2. Redis (缓存 & 消息队列)
  redis:
    image: redis:6.2-alpine
    container_name: ecommerce_redis
    restart: always
    volumes:
      - redis_data:/data

  # 3. Elasticsearch (搜索)
  elasticsearch:
    image: elasticsearch:7.17.10
    container_name: ecommerce_es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # 4. Kibana (可视化，可选)
  kibana:
    image: kibana:7.17.10
    container_name: ecommerce_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  # 5. Django Backend (核心应用)
  backend:
    build: .
    container_name: ecommerce_backend
    restart: always

    # 【核心修正】这里显式写出启动命令
    # entrypoint.sh 会接收到这串命令，进入 if 判断，执行迁移，然后执行这串命令
    command: gunicorn django_project.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 4

    env_file:
      - .env.docker
    volumes:
      - static_volume:/app/staticfiles
      - ./keys:/app/keys
    depends_on:
      - db
      - redis
      - elasticsearch

  # 6. Celery Worker (异步任务)
  celery_worker:
    build: .
    container_name: ecommerce_worker
    restart: always
    command: celery -A django_project worker -l info
    env_file:
      - .env.docker
    volumes:
      - ./keys:/app/keys
      - media_volume:/app/media # Worker 可能需要处理图片等文件
    depends_on:
      - backend
      - redis

  # 7. Celery Beat (定时任务)
  celery_beat:
    build: .
    container_name: ecommerce_beat
    restart: always
    command: celery -A django_project beat -l info
    env_file:
      - .env.docker
    depends_on:
      - backend
      - redis

  # 8. Nginx (网关)
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    restart: always
    ports:
      - "80:80" # 对外暴露 HTTP 端口
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles # 读取 Django 收集的静态文件
      - media_volume:/app/media        # 读取上传的媒体文件
    depends_on:
      - backend

# 定义数据卷
volumes:
  db_data:
  redis_data:
  es_data:
  static_volume:
  media_volume: