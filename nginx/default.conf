# nginx/default.conf

# 1. 定义上游服务器 (Django Gunicorn)
upstream django {
    # "backend" 是我们将要在 docker-compose.yml 里定义的服务名称
    # 8000 是 Gunicorn 容器内部暴露的端口
    server backend:8000;
}

server {
    # Nginx 监听容器内的 80 端口
    listen 80;

    # 2. 处理静态文件请求
    # 当用户访问 http://localhost/static/xxx.css 时
    location /static/ {
        # Nginx 直接去这个目录找文件，不经过 Django
        # 注意：/app/staticfiles/ 是我们在 Django 容器里 STATIC_ROOT 的路径
        # 我们稍后会通过 Docker Volume 把这个目录共享给 Nginx
        alias /app/staticfiles/;
    }

    # 媒体文件 (用户上传的图片)
    location /media/ {
        alias /app/media/;
    }

    # 3. 处理所有其他请求 (API, Admin html)
    location / {
        # 把请求转发给上面的 "django" 上游
        proxy_pass http://django;

        # 传递客户端真实 IP 信息，否则 Django 看到的 IP 全是 Docker 内部 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

